<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Irrigação — Operador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary:  #2e7d32; --secondary:#00695c; --accent:#2196F3;
            --success:  #4CAF50; --warning:#FFC107; --danger:#F44336;
            --nivel:    #00BCD4;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }

        body {
            background: linear-gradient(135deg,#1e3a8a,#1a2a6c,#0066cc);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header { text-align:center; margin-bottom:22px; padding-bottom:14px; border-bottom:2px solid var(--accent); }
        h1 { font-size:2.5rem; color:var(--accent); margin-bottom:6px; }
        .subtitle { font-size:1.1rem; opacity:.85; margin-bottom:12px; }
        .header-links { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:10px; }
        .hlink {
            display:inline-flex; align-items:center; gap:7px;
            padding:8px 16px; border-radius:7px; font-size:.85rem; font-weight:600;
            text-decoration:none; transition:all .2s; cursor:pointer; border:none;
        }
        .hlink-admin { background:rgba(33,150,243,0.18); border:1px solid var(--accent); color:var(--accent); }
        .hlink-admin:hover { background:rgba(33,150,243,0.32); }

        /* Painel duplo */
        .double-panel {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            margin-top: 15px;
        }

        /* Mapa */
        .map-card {
            background: rgba(20,20,40,0.85);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(33,150,243,0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        #map {
            width: 100%;
            height: 450px;
            background: #1a2a4a;
        }
        .map-footer {
            padding: 10px 14px;
            background: rgba(0,0,0,0.5);
            font-size: .75rem;
            text-align: center;
            color: rgba(255,255,255,0.55);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* Lista de equipamentos */
        .list-card {
            background: rgba(30,30,50,0.85);
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 550px;
            border: 1px solid rgba(33,150,243,0.2);
        }
        .list-header {
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .list-header h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .list-header h3 i {
            color: var(--accent);
        }
        .sort-buttons {
            display: flex;
            gap: 5px;
        }
        .sort-mini-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 5px;
            padding: 4px 9px;
            font-size: .7rem;
            cursor: pointer;
            transition: all .2s;
            color: rgba(255,255,255,0.6);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sort-mini-btn:hover {
            background: rgba(33,150,243,0.2);
            border-color: var(--accent);
            color: var(--accent);
        }
        .sort-mini-btn.active {
            background: rgba(33,150,243,0.25);
            border-color: var(--accent);
            color: var(--accent);
        }
        .equip-list {
            overflow-y: auto;
            flex: 1;
            padding: 8px 0;
        }
        .equip-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            cursor: pointer;
            transition: all .2s;
            background: transparent;
        }
        .equip-item:hover {
            background: rgba(33,150,243,0.12);
            border-left: 3px solid var(--accent);
            padding-left: 13px;
        }
        .equip-item.selected {
            background: rgba(33,150,243,0.2);
            border-left: 3px solid var(--accent);
            padding-left: 13px;
        }
        .equip-info {
            flex: 1;
        }
        .equip-name {
            font-weight: bold;
            font-size: .95rem;
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }
        .equip-type {
            font-size: .68rem;
            background: rgba(33,150,243,0.18);
            padding: 2px 7px;
            border-radius: 12px;
            color: var(--accent);
        }
        .equip-location {
            font-size: .72rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .equip-nivel-badge {
            font-size: .65rem;
            background: rgba(0,188,212,0.15);
            border: 1px solid rgba(0,188,212,0.3);
            border-radius: 10px;
            padding: 2px 7px;
            color: var(--nivel);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 6px;
        }
        .equip-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            margin-left: 10px;
        }
        .equip-status.online {
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(76,175,80,0.5); } 100% { box-shadow:0 0 0 5px rgba(76,175,80,0); } }

        .empty-list {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.4);
        }

        /* Modal de detalhes */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            animation: fadeIn .2s;
        }
        .modal-bg.open {
            display: flex;
        }
        .modal-box {
            background: linear-gradient(135deg,#1a2a6c,#0d3b6e);
            border-radius: 14px;
            padding: 24px;
            width: 92%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
            animation: slideDown .3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .modal-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--accent);
        }
        .modal-close {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: white;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .modal-close:hover {
            border-color: var(--danger);
            color: var(--danger);
        }
        .modal-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 9px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            font-size: .88rem;
        }
        .modal-detail-label {
            font-weight: 600;
            color: rgba(255,255,255,0.6);
        }
        .modal-detail-value {
            color: var(--accent);
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }
        .modal-nivel {
            background: rgba(0,188,212,0.08);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            border-left: 3px solid var(--nivel);
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-painel {
            flex: 1;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 7px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all .2s;
            text-decoration: none;
        }
        .btn-painel:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideDown { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }

        @media (max-width: 900px) {
            .double-panel { grid-template-columns: 1fr; }
            .list-card { max-height: 400px; }
            #map { height: 350px; }
        }
    </style>
    <!-- Leaflet CSS/JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-tractor"></i> AGS Irrigação — Operador</h1>
        <p class="subtitle">Visualização de equipamentos e status em tempo real</p>
        <div class="header-links">
            <a href="/admin" class="hlink hlink-admin"><i class="fas fa-lock"></i> Administrador</a>
        </div>
    </header>

    <div class="double-panel">
        <!-- Mapa -->
        <div class="map-card">
            <div id="map"></div>
            <div class="map-footer">
                <i class="fas fa-map-marker-alt"></i> Clique em qualquer equipamento no mapa ou na lista para ver detalhes
            </div>
        </div>

        <!-- Lista de equipamentos -->
        <div class="list-card">
            <div class="list-header">
                <h3><i class="fas fa-list"></i> Equipamentos</h3>
                <div class="sort-buttons">
                    <button class="sort-mini-btn" id="sort-alpha-list"><i class="fas fa-sort-alpha-down"></i> A-Z</button>
                    <button class="sort-mini-btn" id="sort-type-list"><i class="fas fa-filter"></i> Tipo</button>
                </div>
            </div>
            <div class="equip-list" id="equip-list">
                <div class="empty-list"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de detalhes -->
<div class="modal-bg" id="detailModal">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Detalhes</div>
            <button class="modal-close" id="modalCloseBtn"><i class="fas fa-times"></i></button>
        </div>
        <div id="modal-body"></div>
        <div class="modal-actions">
            <a href="#" id="modal-painel-link" class="btn-painel"><i class="fas fa-tachometer-alt"></i> Ir para Painel</a>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
let equipments = [];
let map = null;
let markers = {};
let mqttClient = null;
let deviceStatus = {}; // { poco_id: online? }

let currentSort = 'alpha'; // alpha, type

const ICONS = {
    'Poço': 'fa-tint',
    'Pivô Central': 'fa-sync-alt',
    'Linear': 'fa-arrows-alt-h',
    'Aspersor': 'fa-shower',
    'Pluviômetro': 'fa-cloud-rain',
    'Outro': 'fa-cog'
};

// Escape HTML básico
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

async function loadEquipments() {
    try {
        const res = await fetch('/api/equipments');
        equipments = await res.json();
        // Ordenar inicialmente por nome (alfabética)
        sortEquipments();
        renderList();
        initMap();
        connectMQTT();
    } catch(e) {
        console.error('Erro ao carregar equipamentos:', e);
        $('equip-list').innerHTML = '<div class="empty-list"><i class="fas fa-exclamation-triangle"></i> Erro ao carregar</div>';
    }
}

function sortEquipments() {
    if (currentSort === 'alpha') {
        equipments.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
    } else if (currentSort === 'type') {
        equipments.sort((a, b) => {
            if (a.type === b.type) return a.name.localeCompare(b.name, 'pt-BR');
            return a.type.localeCompare(b.type, 'pt-BR');
        });
    }
}

function updateSortButtons() {
    const alphaBtn = $('sort-alpha-list');
    const typeBtn = $('sort-type-list');
    alphaBtn.classList.remove('active');
    typeBtn.classList.remove('active');
    if (currentSort === 'alpha') alphaBtn.classList.add('active');
    else if (currentSort === 'type') typeBtn.classList.add('active');
}

$('sort-alpha-list').onclick = () => {
    currentSort = 'alpha';
    updateSortButtons();
    sortEquipments();
    renderList();
    // Atualiza marcadores no mapa (reordenar não afeta marcadores, mas mantém sincronia)
    updateMarkersOrder();
};

$('sort-type-list').onclick = () => {
    currentSort = 'type';
    updateSortButtons();
    sortEquipments();
    renderList();
    updateMarkersOrder();
};

function updateMarkersOrder() {
    // Apenas para manter consistência visual, os marcadores já existem
    // Não precisa recriar, mas podemos garantir que o mapa reflita
}

function renderList() {
    const container = $('equip-list');
    if (!equipments.length) {
        container.innerHTML = '<div class="empty-list"><i class="fas fa-database"></i> Nenhum equipamento cadastrado</div>';
        return;
    }

    let html = '';
    equipments.forEach(eq => {
        const icon = ICONS[eq.type] || 'fa-cog';
        const hasNivel = !!(eq.nivel_canal);
        const statusClass = deviceStatus[eq.poco_id] === true ? 'online' : '';
        html += `
            <div class="equip-item" data-id="${eq.id}" data-poco="${eq.poco_id}">
                <div class="equip-info">
                    <div class="equip-name">
                        <i class="fas ${icon}" style="color:var(--accent)"></i>
                        ${escapeHtml(eq.name)}
                        <span class="equip-type">${escapeHtml(eq.type)}</span>
                        ${hasNivel ? `<span class="equip-nivel-badge"><i class="fas fa-ruler-vertical"></i> ${escapeHtml(eq.nivel_canal)}</span>` : ''}
                    </div>
                    <div class="equip-location">
                        <i class="fas fa-map-marker-alt" style="font-size:.65rem"></i>
                        ${escapeHtml(eq.location || 'Sem localização')}
                    </div>
                </div>
                <div class="equip-status ${statusClass}" title="${statusClass === 'online' ? 'Online' : 'Offline'}"></div>
            </div>
        `;
    });
    container.innerHTML = html;

    // Eventos de clique nos itens da lista
    document.querySelectorAll('.equip-item').forEach(el => {
        el.addEventListener('click', () => {
            const id = el.dataset.id;
            const eq = equipments.find(e => e.id === id);
            if (eq) {
                showDetails(eq);
                highlightMarker(eq.id);
                // Remove selected de todos e adiciona no clicado
                document.querySelectorAll('.equip-item').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
            }
        });
    });
}

function initMap() {
    // Centralizar no Brasil (aproximado)
    map = L.map('map').setView([-14.235, -51.925], 4.5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
        subdomains: 'abcd',
        maxZoom: 19,
        minZoom: 3
    }).addTo(map);

    // Adicionar marcadores
    equipments.forEach(eq => {
        addMarker(eq);
    });
}

function addMarker(eq) {
    const lat = parseFloat(eq.lat);
    const lng = parseFloat(eq.lng);
    if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) return;

    const iconClass = ICONS[eq.type] || 'fa-cog';
    const hasNivel = !!(eq.nivel_canal);
    const markerHtml = `
        <div style="background:var(--accent); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.4); border:2px solid white;">
            <i class="fas ${iconClass}" style="color:white; font-size:1rem;"></i>
        </div>
    `;
    const customIcon = L.divIcon({
        html: markerHtml,
        iconSize: [36, 36],
        className: 'custom-marker',
        popupAnchor: [0, -18]
    });

    const marker = L.marker([lat, lng], { icon: customIcon })
        .addTo(map)
        .bindPopup(`
            <strong>${escapeHtml(eq.name)}</strong><br>
            Tipo: ${escapeHtml(eq.type)}<br>
            ${eq.location ? `Local: ${escapeHtml(eq.location)}` : ''}<br>
            <button onclick="window.location.href='/painel?id=${eq.id}'" style="margin-top:6px;background:#2196F3;border:none;padding:5px 12px;border-radius:5px;color:white;cursor:pointer;">
                <i class="fas fa-chart-line"></i> Acessar Painel
            </button>
        `);

    marker.on('click', () => {
        showDetails(eq);
        highlightMarker(eq.id);
        // Seleciona o item na lista
        document.querySelectorAll('.equip-item').forEach(el => {
            el.classList.remove('selected');
            if (el.dataset.id === eq.id) el.classList.add('selected');
        });
    });

    markers[eq.id] = marker;
}

function highlightMarker(id) {
    // Resetar todos os marcadores para ícone normal
    equipments.forEach(eq => {
        const m = markers[eq.id];
        if (m) {
            const iconClass = ICONS[eq.type] || 'fa-cog';
            const normalHtml = `
                <div style="background:var(--accent); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.4); border:2px solid white;">
                    <i class="fas ${iconClass}" style="color:white; font-size:1rem;"></i>
                </div>
            `;
            m.setIcon(L.divIcon({ html: normalHtml, iconSize: [36, 36], className: 'custom-marker' }));
        }
    });

    // Destacar o marcador selecionado
    const selectedEq = equipments.find(e => e.id === id);
    if (selectedEq && markers[id]) {
        const iconClass = ICONS[selectedEq.type] || 'fa-cog';
        const highlightHtml = `
            <div style="background:#FFC107; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px rgba(255,193,7,0.8); border:3px solid white; transition:all .2s;">
                <i class="fas ${iconClass}" style="color:#1a1a1a; font-size:1.2rem;"></i>
            </div>
        `;
        markers[id].setIcon(L.divIcon({ html: highlightHtml, iconSize: [42, 42], className: 'custom-marker' }));
        // Abrir popup e centralizar
        markers[id].openPopup();
        map.setView(markers[id].getLatLng(), 12);
    }
}

function showDetails(eq) {
    $('modal-title').textContent = eq.name;
    const hasNivel = !!(eq.nivel_canal);
    const statusOnline = deviceStatus[eq.poco_id] === true;
    const statusText = statusOnline ? '<span style="color:#4CAF50"><i class="fas fa-circle"></i> Online</span>' : '<span style="color:#F44336"><i class="fas fa-circle"></i> Offline</span>';

    let nivelHtml = '';
    if (hasNivel) {
        nivelHtml = `
            <div class="modal-nivel">
                <div class="modal-detail-row">
                    <span class="modal-detail-label"><i class="fas fa-ruler-vertical"></i> Sensor Nível:</span>
                    <span class="modal-detail-value">Canal ${escapeHtml(eq.nivel_canal)}</span>
                </div>
                <div class="modal-detail-row">
                    <span class="modal-detail-label"><i class="fas fa-chart-line"></i> Tópico:</span>
                    <span class="modal-detail-value" style="font-size:.7rem">${escapeHtml(eq.nivel_topic)}</span>
                </div>
            </div>
        `;
    }

    const bodyHtml = `
        <div class="modal-detail-row">
            <span class="modal-detail-label">Tipo:</span>
            <span class="modal-detail-value">${escapeHtml(eq.type)}</span>
        </div>
        <div class="modal-detail-row">
            <span class="modal-detail-label">ID do Poço:</span>
            <span class="modal-detail-value"><code>${escapeHtml(eq.poco_id)}</code></span>
        </div>
        <div class="modal-detail-row">
            <span class="modal-detail-label">Localização:</span>
            <span class="modal-detail-value">${escapeHtml(eq.location || '—')}</span>
        </div>
        <div class="modal-detail-row">
            <span class="modal-detail-label">Status MQTT:</span>
            <span class="modal-detail-value">${statusText}</span>
        </div>
        <div class="modal-detail-row">
            <span class="modal-detail-label">Comandos:</span>
            <span class="modal-detail-value" style="font-size:.7rem">${escapeHtml(eq.topic_cmd)}</span>
        </div>
        <div class="modal-detail-row">
            <span class="modal-detail-label">Dados:</span>
            <span class="modal-detail-value" style="font-size:.7rem">${escapeHtml(eq.topic_dados)}</span>
        </div>
        ${eq.description ? `<div class="modal-detail-row"><span class="modal-detail-label">Descrição:</span><span class="modal-detail-value">${escapeHtml(eq.description)}</span></div>` : ''}
        ${nivelHtml}
    `;

    $('modal-body').innerHTML = bodyHtml;
    const painelLink = $('modal-painel-link');
    painelLink.href = `/painel?id=${eq.id}`;
    $('detailModal').classList.add('open');
}

function closeModal() {
    $('detailModal').classList.remove('open');
}

$('modalCloseBtn').onclick = closeModal;
$('detailModal').onclick = e => { if (e.target === $('detailModal')) closeModal(); };

function connectMQTT() {
    // Configurações MQTT (mesmo broker)
    const BROKER = 'wss://mqtt.aguasanta.agr.br';
    const USER   = 'coas';
    const PASS   = 'AguaSanta@452';

    mqttClient = mqtt.connect(BROKER, {
        clientId: 'AGS_Operador_' + Math.random().toString(16).substr(2, 8),
        username: USER,
        password: PASS,
        keepalive: 60,
        clean: true,
        reconnectPeriod: 3000
    });

    mqttClient.on('connect', () => {
        console.log('MQTT conectado (operador)');
        // Subscrever tópicos de status de todos os equipamentos
        equipments.forEach(eq => {
            const statusTopic = eq.topic_status;
            if (statusTopic) {
                mqttClient.subscribe(statusTopic, { qos: 1 }, err => {
                    if (err) console.warn(`Erro ao subscrever ${statusTopic}:`, err);
                });
            }
        });
    });

    mqttClient.on('message', (topic, payload) => {
        const msg = payload.toString();
        // Encontrar qual equipamento tem esse tópico de status
        const eq = equipments.find(e => e.topic_status === topic);
        if (eq) {
            const isOnline = msg.toLowerCase() === 'online';
            deviceStatus[eq.poco_id] = isOnline;
            // Atualizar indicador visual na lista
            const item = document.querySelector(`.equip-item[data-poco="${eq.poco_id}"]`);
            if (item) {
                const statusDiv = item.querySelector('.equip-status');
                if (statusDiv) {
                    if (isOnline) {
                        statusDiv.classList.add('online');
                    } else {
                        statusDiv.classList.remove('online');
                    }
                }
            }
            // Atualizar popup do marcador? opcional
        }
    });

    mqttClient.on('error', err => console.warn('MQTT err:', err));
}

// Inicializar
loadEquipments();
</script>
</body>
</html>
